<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact - Paroisse AI</title>
    <style>
        body{font-family:Arial;background:#f4f6f9;padding:40px}
        .container{max-width:600px;margin:auto;background:white;padding:30px;border-radius:16px}
        h1{color:#4a4a6a}
        input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:8px}
        button{background:#4a4a6a;color:white;padding:12px;border:none;border-radius:8px;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <h1>📞 Contact</h1>
    <p>Pour toute question pastorale, veuillez contacter le secrétariat de votre paroisse.</p>
    <p>Vous pouvez également écrire à : <strong>paroisse.diocese@gmail.com</strong></p>
    <form action="mailto:paroisse.diocese@gmail.com" method="post" enctype="text/plain">
        <input type="text" name="nom" placeholder="Nom / Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" rows="5" placeholder="Message..." required></textarea>
        <button type="submit">Envoyer / Send</button>
    </form>
    <p><a href="/">⬅ Retour à l'accueil</a></p>
</div>
</body>
</html>
